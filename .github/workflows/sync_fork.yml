name: sync_fork

on:
  schedule:
    # Keep the fork close to upstream; Docker publishing runs after this workflow succeeds.
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_FORK_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync fork branches and tags
        env:
          BRANCHES: main nightly
          GH_TOKEN: ${{ secrets.SYNC_FORK_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          upstream_url="$(gh api "repos/${GITHUB_REPOSITORY}" --jq ".parent.clone_url // empty")"

          if [[ -z "${upstream_url}" ]]; then
            echo "::error::This workflow must run from a fork so GitHub can expose the upstream repository URL."
            exit 1
          fi

          git remote add upstream "${upstream_url}"
          git fetch --prune --no-tags origin
          git fetch --prune --no-tags upstream

          for branch in ${BRANCHES}; do
            if ! git show-ref --verify --quiet "refs/remotes/upstream/${branch}"; then
              echo "Upstream branch ${branch} does not exist; skipping."
              continue
            fi

            if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              git checkout -B "${branch}" "origin/${branch}"

              if git merge-base --is-ancestor "HEAD" "upstream/${branch}"; then
                git merge --ff-only "upstream/${branch}"
              else
                echo "origin/${branch} has fork-only commits; merging upstream/${branch} instead of fast-forwarding."
                git merge --no-edit -m "Merge upstream/${branch} into ${branch}" "upstream/${branch}"
              fi
            else
              echo "Fork branch ${branch} is missing; creating it from upstream/${branch}."
              git checkout -B "${branch}" "upstream/${branch}"
            fi

            git push origin "HEAD:${branch}"
          done

          echo "Syncing upstream release tags that match vX.Y.Z."
          mapfile -t release_tags < <(
            git ls-remote --refs --tags upstream "v*" |
              awk '$2 ~ /^refs\/tags\/v[0-9]+\.[0-9]+\.[0-9]+$/ { sub("^refs/tags/", "", $2); print $2 }' |
              sort -V
          )

          for tag in "${release_tags[@]}"; do
            if git ls-remote --exit-code --refs --tags origin "${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists in origin; skipping."
              continue
            fi

            git fetch --force --no-tags upstream "refs/tags/${tag}:refs/tags/${tag}"

            if push_output="$(git push origin "refs/tags/${tag}:refs/tags/${tag}" 2>&1)"; then
              echo "${push_output}"
              continue
            fi

            echo "${push_output}"
            if grep -q "refusing to allow a GitHub App to create or update workflow" <<<"${push_output}"; then
              echo "::warning::Skipping ${tag}; configure SYNC_FORK_TOKEN with workflow permission if this release tag must be mirrored."
              continue
            fi

            exit 1
          done
